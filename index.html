<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Website</title>

<link rel="stylesheet" href="test.css">

</head>
<body>

<!-- Navbar -->
<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<!-- Heading -->
<h1>Responsive Website</h1>

<!-- Image -->
<img src="https://picsum.photos/300/200" alt="Sample Image">

<!-- Video -->
<video controls>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<!-- Table -->
<table>
    <tr>
        <th>1</th>
        <th>2</th>
        <th>3</th>
    </tr>
    <tr>
        <td>ABC</td>
        <td>DEF</td>
        <td>GHI</td>
    </tr>
    <tr>
        <td>JKL</td>
        <td>MNO</td>
        <td>PQR</td>
    </tr>
</table>

<!-- Button -->
<button>Click Me</button>

<!-- Grid -->
<div class="grid-container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
    <div class="box">7</div>
    <div class="box">8</div>
</div>

</body>
</html>
